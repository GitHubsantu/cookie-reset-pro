<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Reset Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
        </svg>
        <h1>Cookie Reset Pro</h1>
      </div>
      <div class="version">v1.0.0</div>
    </header>

    <section class="status-section">
      <div class="domain-info">
        <span class="label">Current Domain:</span>
        <span id="currentDomain" class="domain">Loading...</span>
      </div>
      
      <div class="toggle-container">
        <label class="switch">
          <input type="checkbox" id="enableToggle">
          <span class="slider round"></span>
        </label>
        <span class="toggle-label" id="toggleLabel">Enabled</span>
      </div>
    </section>

    <section class="actions">
      <button id="clearCurrentSite" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
        </svg>
        Clear Current Site
      </button>
      
      <button id="clearAllCookies" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
        Clear All Cookies
      </button>
      
      <button id="clearAllStorage" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
        Clear All Storage
      </button>
    </section>

    <section class="stats">
      <h3>Statistics</h3>
      <div class="stat-grid">
        <div class="stat-item">
          <div class="stat-value" id="cookiesRemoved">0</div>
          <div class="stat-label">Cookies Removed</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="domainsCleaned">0</div>
          <div class="stat-label">Domains Cleaned</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="storageRemoved">0</div>
          <div class="stat-label">Storage Items</div>
        </div>
      </div>
    </section>

    <section class="settings">
      <div class="setting-item">
        <label class="checkbox-label">
          <input type="checkbox" id="debugMode">
          <span>Debug Mode</span>
        </label>
      </div>
    </section>

    <footer class="footer">
      <div id="statusMessage" class="status-message"></div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
